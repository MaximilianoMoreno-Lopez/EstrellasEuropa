<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="13" fill="#fdf9f3"/>
  <!-- Estrella pinwheel de 5 aspas, una por color de la federación -->
  <g transform="translate(32,33)">
    <polygon points="0,0 0,-25 11,-8"  fill="#c44e2a" transform="rotate(0)"/>
    <polygon points="0,0 0,-25 11,-8"  fill="#d9a727" transform="rotate(72)"/>
    <polygon points="0,0 0,-25 11,-8"  fill="#3d7848" transform="rotate(144)"/>
    <polygon points="0,0 0,-25 11,-8"  fill="#6b3a8a" transform="rotate(216)"/>
    <polygon points="0,0 0,-25 11,-8"  fill="#2b52a8" transform="rotate(288)"/>
  </g>
</svg>
